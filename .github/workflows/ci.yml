name: CI

on:
  push:
    branches:
      - main
      - feature/**
      - fix/**
  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      AIRFLOW_DATA_DIR: data
      GITHUB_ACTIONS: "true"
      KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff Lint
        run: |
          ruff check .

      - name: Black Format Check
        run: |
          black --check .

      - name: Run ETL Pipeline
        run: |
          python -m src.extract.download
          python -m src.transform.bronze
          python -m src.transform.silver
          python -m src.transform.gold
          python -m src.transform.analytics

      - name: Run Tests with Coverage
        run: |
          python -m pytest --cov=src --cov-report=term-missing --ignore=tests/test_oci_connection.py
