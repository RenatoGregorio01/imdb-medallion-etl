name: CI

on:
  push:
    branches:
      - main
      - feature/**
      - fix/**
  pull_request:
    branches:
      - main
  
jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff Lint
        run: |
          ruff check .

      - name: Black Format Check
        run: |
          black --check .

      - name: Run Tests
        # O --ignore evita que o teste de conexão OCI falhe no GitHub Actions
        run: |
          python -m pytest --ignore=tests/test_oci_connection.py

      - name: Run Tests with Coverage
        # Ignora o teste de conexão aqui também para manter o relatório consistente
        run: |
          python -m pytest --cov=src --cov-report=term-missing --ignore=tests/test_oci_connection.py
