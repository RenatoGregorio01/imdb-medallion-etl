name: CI

on:
  push:
    branches:
      - main
      - feature/**
      - fix/**
  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      AIRFLOW_DATA_DIR: data
      GITHUB_ACTIONS: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff Lint
        run: |
          ruff check .

      - name: Black Format Check
        run: |
          black --check .

      - name: Run ETL Pipeline
        run: |
          mkdir -p data/raw
          
          echo "imdb_id,title,year,average_rating,num_votes,genres,imdb_url" > data/raw/imdb_top_movies_1980_2026.csv
          echo "tt01,Dummy,2020,8.0,10,Action,https://www.imdb.com/title/tt01" >> data/raw/imdb_top_movies_1980_2026.csv
        
          python -m src.transform.bronze
          python -m src.transform.silver
          python -m src.transform.gold
          python -m src.transform.analytics

      - name: Run Tests with Coverage
        run: |
          python -m pytest --cov=src --cov-report=term-missing --ignore=tests/test_oci_connection.py
